name: Basic CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  basic-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            npm-shrinkwrap.json

      - name: Install deps (Node)
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Test (Node)
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test --if-present

      - name: Build (Node)
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build --if-present

      - name: No-op for non-Node repos
        if: ${{ hashFiles('package.json') == '' }}
        run: echo "No package.json detected; skipping Node checks."
